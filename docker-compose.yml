services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - QDRANT_HOST=qdrant
      - QDRANT_PATH=/qdrant/storage
      - USE_LOCAL_CHAT_MODEL=${USE_LOCAL_CHAT_MODEL:-true}
    volumes:
      - ./vector_db:/qdrant/storage
      - ./llm:/app/llm:ro
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  neo4j:
    image: neo4j:2026.04.0
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | cypher-shell -u neo4j -p password || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./vector_db:/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    mem_limit: 2g

volumes:
  neo4j_data:
    external: true
    name: neo4j_data_2026
  neo4j_logs:
